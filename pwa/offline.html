<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>5G Security — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      text-align: center;
      padding: 32px;
    }

    svg { width: 64px; height: 64px; opacity: 0.4; }

    h1 {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    p {
      font-size: 0.85rem;
      color: #666;
      max-width: 260px;
      line-height: 1.6;
    }

    button {
      margin-top: 8px;
      padding: 12px 28px;
      background: #E8000E;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M36 4L8 16V34C8 50.4 20.4 65.6 36 68C51.6 65.6 64 50.4 64 34V16L36 4Z"
          stroke="#E8000E" stroke-width="2" stroke-linejoin="round"/>
    <text x="36" y="42" text-anchor="middle"
          font-family="-apple-system, sans-serif"
          font-size="18" font-weight="800" fill="#E8000E">5G</text>
  </svg>

  <h1>You're Offline</h1>
  <p>Check your internet connection and try again.</p>
  <button onclick="location.reload()">Try Again</button>
</body>
</html>
