<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>5G Security Portal</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#E8000E" />

  <!-- iOS PWA support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="5G Security" />
  <link rel="apple-touch-icon" href="/icon-512.png" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
      background: #0a0a0a;
      overflow: hidden;
    }

    /* Splash screen shown while iframe loads */
    #splash {
      position: fixed;
      inset: 0;
      background: #0a0a0a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    #splash.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #splash svg {
      width: 72px;
      height: 72px;
    }

    #splash h1 {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #splash p {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 0.75rem;
      color: #666;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Spinner */
    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid #333;
      border-top-color: #E8000E;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* The portal iframe */
    #portal {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      /* Push down on iOS to clear the status bar */
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
  </style>
</head>
<body>

  <!-- Splash -->
  <div id="splash">
    <!-- 5G Security shield logo in SVG so no image dependency -->
    <svg viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M36 4L8 16V34C8 50.4 20.4 65.6 36 68C51.6 65.6 64 50.4 64 34V16L36 4Z"
            fill="#E8000E" opacity="0.15"/>
      <path d="M36 4L8 16V34C8 50.4 20.4 65.6 36 68C51.6 65.6 64 50.4 64 34V16L36 4Z"
            stroke="#E8000E" stroke-width="2" stroke-linejoin="round"/>
      <text x="36" y="42" text-anchor="middle"
            font-family="-apple-system, sans-serif"
            font-size="18" font-weight="800"
            fill="#E8000E">5G</text>
    </svg>
    <h1>5G Security</h1>
    <p>Customer Portal</p>
    <div class="spinner"></div>
  </div>

  <!-- Portal iframe -->
  <iframe
    id="portal"
    src="https://5gticket.streamlit.app"
    allow="camera; microphone; clipboard-write"
    loading="eager"
  ></iframe>

  <script>
    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }

    // Hide splash once iframe loads
    const iframe = document.getElementById('portal');
    const splash = document.getElementById('splash');

    iframe.addEventListener('load', () => {
      setTimeout(() => splash.classList.add('hidden'), 300);
    });

    // Safety fallback — hide splash after 8s regardless
    setTimeout(() => splash.classList.add('hidden'), 8000);
  </script>

</body>
</html>
